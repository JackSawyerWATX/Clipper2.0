version: 0.2
phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm ci
  build:
    commands:
      - echo "Running build"
      - npm run build --if-present
      - echo "Running tests with threads pool"
      - npx vitest run --pool=threads --poolOptions.threads.singleThread=true
  post_build:
    commands:
      - echo "Build completed successfully"
