version: 0.2

phases:
  pre_build:
    commands:
      - echo "[$(date)] Installing frontend dependencies..."
      - npm install --verbose
      - echo "[$(date)] Installing backend dependencies..."
      - cd server && npm install --verbose && cd ..
      - echo "[$(date)] All dependencies installed"
  
  build:
    commands:
      - echo "[$(date)] Starting frontend build..."
      - npm run build 2>&1
      - echo "[$(date)] Checking dist directory..."
      - ls -la dist/ || echo "ERROR: dist directory not created"
      - echo "[$(date)] Build phase complete"

artifacts:
  files:
    - '**/*'
  name: BuildArtifact
  discard-paths: no
  exclude:
    - node_modules/**/*
    - server/node_modules/**/*
    - .git/**/*
    - .gitignore
    - .env
    - .env.local
    - coverage/**/*
    - '**/*.test.js'
    - jest.config.js
    - vitest.config.js


