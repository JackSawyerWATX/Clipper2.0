version: 0.2

phases:
  pre_build:
    commands:
      - echo "[$(date)] Installing frontend dependencies..."
      - npm install
      - echo "[$(date)] Installing server dependencies..."
      - cd server && npm install && cd ..
      - echo "[$(date)] Dependencies installed successfully"
  
  build:
    commands:
      - echo "[$(date)] Building frontend React app..."
      - npm run build
      - echo "[$(date)] Checking if dist directory exists..."
      - ls -la dist/ || echo "ERROR: dist directory not found"
      - echo "[$(date)] Build completed successfully"

artifacts:
  files:
    - '**/*'
  name: BuildArtifact
  discard-paths: no
  exclude:
    - node_modules/**/*
    - server/node_modules/**/*
    - .git/**/*
    - .gitignore
    - .env
    - .env.local
    - coverage/**/*
    - '**/*.test.js'
    - jest.config.js
    - vitest.config.js


