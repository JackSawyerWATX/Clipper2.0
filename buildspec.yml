version: 0.2

phases:
  pre_build:
    commands:
      - echo "Installing dependencies..."
      - npm install
      - cd server && npm install && cd ..
  
  build:
    commands:
      - echo "Building frontend..."
      - npm run build
      - echo "Build completed successfully"

artifacts:
  files:
    - '**/*'
  name: BuildArtifact
  discard-paths: no
  exclude:
    - node_modules/**/*
    - server/node_modules/**/*
    - .git/**/*
    - .gitignore
    - .env
    - .env.local
    - coverage/**/*
    - '**/*.test.js'
    - jest.config.js
    - vitest.config.js


