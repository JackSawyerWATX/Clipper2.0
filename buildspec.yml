version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing frontend dependencies"
      - npm install
      - echo "Installing backend dependencies"
      - cd server && npm install && cd ..
  build:
    commands:
      - echo "Building frontend"
      - npm run build --if-present
      - echo "Build completed successfully"

artifacts:
  files:
    - '**/*'
  name: BuildOutput
  exclude:
    - node_modules/**/*
    - server/node_modules/**/*
    - .git/**/*
    - .gitignore
    - .env

