name: Deploy to Lightsail

# Trigger on push to main branch or manual dispatch
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    # Backend setup and tests
    - name: Install backend dependencies
      run: |
        cd server
        npm install

    - name: Run backend tests (if available)
      run: |
        cd server
        npm test 2>/dev/null || echo "No tests configured"
      continue-on-error: true

    # Frontend setup and build
    - name: Install frontend dependencies
      run: npm install

    - name: Build frontend
      run: npm run build

    # Deploy to Lightsail
    - name: Deploy to Lightsail
      env:
        LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
        LIGHTSAIL_USERNAME: ${{ secrets.LIGHTSAIL_USERNAME }}
        LIGHTSAIL_SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
        LIGHTSAIL_SSH_PORT: ${{ secrets.LIGHTSAIL_SSH_PORT }}
      run: |
        # Create SSH key file
        mkdir -p ~/.ssh
        echo "$LIGHTSAIL_SSH_KEY" > ~/.ssh/lightsail_key
        chmod 600 ~/.ssh/lightsail_key
        
        # Add host to known_hosts to avoid SSH prompt
        ssh-keyscan -p $LIGHTSAIL_SSH_PORT -H $LIGHTSAIL_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
        
        # Deploy script
        ssh -i ~/.ssh/lightsail_key -p $LIGHTSAIL_SSH_PORT $LIGHTSAIL_USERNAME@$LIGHTSAIL_HOST << 'EOF'
          set -e
          
          echo "🚀 Starting deployment..."
          
          # Navigate to project directory
          cd /home/ec2-user/Clipper2.0
          
          # Update code from git
          echo "📦 Pulling latest code..."
          git pull origin main || { echo "Git pull failed"; exit 1; }
          
          # Install dependencies
          echo "📚 Installing dependencies..."
          npm install
          cd server
          npm install
          cd ..
          
          # Build frontend
          echo "🔨 Building frontend..."
          npm run build
          
          # Restart services
          echo "🔄 Restarting services..."
          pm2 restart all
          
          echo "✅ Deployment complete!"
          pm2 status
        EOF

    - name: Deployment Success
      if: success()
      run: echo "✅ Deployment successful!"

    - name: Deployment Failed
      if: failure()
      run: echo "❌ Deployment failed. Check logs above."

      