name: Tests & Linting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    # Install all workspace dependencies (monorepo)
    - name: Install workspace dependencies
      run: npm install

    # Frontend tests
    - name: Build frontend
      run: npm --workspace=@clipper/frontend run build

    - name: Lint frontend (if ESLint configured)
      run: npm --workspace=@clipper/frontend run lint 2>/dev/null || echo "No lint script configured"
      continue-on-error: true

    - name: Test frontend
      run: npm --workspace=@clipper/frontend run test 2>/dev/null || echo "No tests configured"
      continue-on-error: true

    # Backend tests (Express)
    - name: Check Express backend syntax
      run: |
        cd packages/express-backend
        node -c server.js
        echo "✅ Express backend syntax check passed"

    - name: Test Express backend
      run: npm --workspace=@clipper/express-backend run test 2>/dev/null || echo "No tests configured"
      continue-on-error: true

    # Summary
    - name: Test Summary
      if: always()
      run: echo "✅ Test pipeline completed"
